<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NEOARCADE — PACMAN</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        font-family: sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #shim {
        font-family: BDCartoonShoutRegular;
        position: absolute;
        visibility: hidden;
      }
      #frame {
        width: min(92vw, 92vh * 0.76);
        height: min(92vw/0.76, 92vh);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #pacman {
        width: 100%;
        height: 100%;
      }
      @font-face {
        font-family: "BDCartoonShoutRegular";
        src: url("/games/pacman/BD_Cartoon_Shout-webfont.ttf")
          format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      canvas {
        max-width: 100%;
        max-height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="shim">shim for font face</div>
    <div id="frame"><div id="pacman"></div></div>
    <script src="/games/pacman/modernizr-1.5.min.js"></script>
    <script src="/games/pacman/pacman.js"></script>
    <script>
      (function () {
        const root = "/games/pacman/";
        const el = document.getElementById("pacman");
        const keyState = {};

        function dispatchKey(type, keyCode, key) {
          const event = new KeyboardEvent(type, {
            bubbles: true,
            cancelable: true,
            key,
            keyCode,
            which: keyCode,
          });
          Object.defineProperty(event, "keyCode", {
            get() {
              return keyCode;
            },
          });
          Object.defineProperty(event, "which", {
            get() {
              return keyCode;
            },
          });
          document.dispatchEvent(event);
        }

        function pressKey(keyCode, key) {
          if (keyState[keyCode]) return;
          keyState[keyCode] = true;
          dispatchKey("keydown", keyCode, key);
          dispatchKey("keypress", keyCode, key);
        }

        function releaseKey(keyCode, key) {
          if (!keyState[keyCode]) return;
          keyState[keyCode] = false;
          dispatchKey("keyup", keyCode, key);
        }

        window.addEventListener("message", (e) => {
          const d = e.data;
          if (!(d && d.type === "neoarcade-input")) return;
          const pressed = d.state === "pressed";
          if (d.button === "left")
            return pressed
              ? pressKey(37, "ArrowLeft")
              : releaseKey(37, "ArrowLeft");
          if (d.button === "up")
            return pressed
              ? pressKey(38, "ArrowUp")
              : releaseKey(38, "ArrowUp");
          if (d.button === "right")
            return pressed
              ? pressKey(39, "ArrowRight")
              : releaseKey(39, "ArrowRight");
          if (d.button === "down")
            return pressed
              ? pressKey(40, "ArrowDown")
              : releaseKey(40, "ArrowDown");
          if (
            (d.button === "start" || d.button === "a" || d.button === "b") &&
            pressed
          ) {
            pressKey(78, "n");
            setTimeout(() => releaseKey(78, "n"), 20);
          }
        });

        if (
          Modernizr.canvas &&
          Modernizr.localstorage &&
          Modernizr.audio &&
          (Modernizr.audio.ogg || Modernizr.audio.mp3)
        ) {
          window.setTimeout(function () {
            PACMAN.init(el, root);
          }, 0);
        } else {
          el.innerHTML = "Tu navegador no soporta los requisitos de Pacman.";
        }
      })();
    </script>
  </body>
</html>
