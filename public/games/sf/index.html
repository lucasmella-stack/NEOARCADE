<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NEOARCADE — STREET FIGHTER</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0a0a0f;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      h1,
      h2,
      ul {
        display: none;
      }
      #field {
        transform-origin: center center;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="field">
      <div id="ch1" class="character"></div>
      <div id="ch2" class="character"></div>
    </div>

    <script src="js/game.js"></script>
    <script>
      // ── Scale field to fit viewport ──────────────────────────────────────
      (function () {
        var field = document.getElementById("field");
        function scaleField() {
          var fw = 621,
            fh = 224;
          var sx = window.innerWidth / fw;
          var sy = window.innerHeight / fh;
          var s = Math.min(sx, sy);
          field.style.transform = "scale(" + s + ")";
        }
        scaleField();
        window.addEventListener("resize", scaleField);
      })();

      // ── Initialize game ─────────────────────────────────────────────────
      $(document).ready(function () {
        var a = new PlayGround("ch1");
        a.initialize();
        setInterval(a.mainLoop, 200);
      });

      // ── NEOARCADE Joystick Bridge ───────────────────────────────────────
      (function () {
        var activeKeys = {};

        function dispatchKey(type, keyCode) {
          var event = document.createEvent("KeyboardEvent");
          Object.defineProperty(event, "keyCode", {
            get: function () {
              return keyCode;
            },
          });
          Object.defineProperty(event, "which", {
            get: function () {
              return keyCode;
            },
          });
          event.initEvent(type, true, true);
          document.dispatchEvent(event);
        }

        function press(keyCode) {
          if (activeKeys[keyCode]) return;
          activeKeys[keyCode] = true;
          dispatchKey("keydown", keyCode);
        }

        function release(keyCode) {
          if (!activeKeys[keyCode]) return;
          activeKeys[keyCode] = false;
          dispatchKey("keyup", keyCode);
        }

        window.addEventListener("message", function (event) {
          var data = event.data;
          if (!data || data.type !== "neoarcade-input") return;
          var pressed = data.state === "pressed";

          var MAP = {
            left: 37,
            right: 39,
            up: 38,
            down: 40,
            a: 65, // A = punch
            b: 83, // S = kick
            x: 68, // D = beam
            y: 70, // F = roundhouse
          };

          var code = MAP[data.button];
          if (!code) return;
          pressed ? press(code) : release(code);
        });
      })();
    </script>
  </body>
</html>
