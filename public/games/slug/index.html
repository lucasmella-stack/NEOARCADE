<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>METAL SLUG — NEOARCADE</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        background: #0a0a0f;
        color: #e0e0e0;
        font-family: "Courier New", Courier, monospace;
        overflow: hidden;
      }
      #emulator-wrap {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #back-btn {
        position: fixed;
        top: 10px;
        left: 12px;
        z-index: 100;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid #00d4ff44;
        color: #00d4ff;
        font-family: inherit;
        font-size: 0.75rem;
        padding: 4px 10px;
        cursor: pointer;
        border-radius: 4px;
        letter-spacing: 1px;
      }
      #back-btn:hover {
        background: #00d4ff22;
      }
      #game-container {
        flex: 1;
        width: 100%;
        height: 100%;
      }
      #loading-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        background: #0a0a0f;
        z-index: 50;
        transition: opacity 0.4s;
      }
      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .spin {
        width: 44px;
        height: 44px;
        border: 3px solid #00d4ff33;
        border-top-color: #00d4ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #loading-overlay p {
        color: #00d4ff;
        font-size: 0.85rem;
        letter-spacing: 3px;
        text-shadow: 0 0 10px #00d4ff;
      }
      .panel {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 10, 15, 0.92);
        z-index: 60;
        padding: 1.25rem;
      }
      .panel.hidden {
        display: none;
      }
      .card {
        width: min(520px, 100%);
        padding: 1.25rem;
        border: 1px solid #00d4ff55;
        border-radius: 14px;
        background: linear-gradient(180deg, #111827, #090b12);
        box-shadow: 0 0 30px #00d4ff22;
      }
      .card h2 {
        margin-bottom: 0.75rem;
        color: #00d4ff;
        letter-spacing: 2px;
        font-size: 1rem;
      }
      .card p {
        color: #c3d4de;
        line-height: 1.55;
        font-size: 0.92rem;
      }
      .card code {
        color: #58fafd;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 1rem;
        flex-wrap: wrap;
      }
      .primary-btn,
      .secondary-btn {
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1rem;
        font: inherit;
        letter-spacing: 1px;
        cursor: pointer;
      }
      .primary-btn {
        background: linear-gradient(180deg, #00d4ff, #0080ff);
        color: #051019;
        font-weight: 700;
      }
      .primary-btn:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      .secondary-btn {
        background: transparent;
        color: #e5eef2;
        border: 1px solid #7b8b95;
      }
      .list {
        margin-top: 0.85rem;
        padding-left: 1.2rem;
        color: #9fb6c1;
      }
      .list li + li {
        margin-top: 0.45rem;
      }
    </style>
  </head>
  <body>
    <button id="back-btn" onclick="history.back()">&#8592; VOLVER</button>
    <div id="emulator-wrap">
      <div id="game-container"></div>
    </div>
    <div id="loading-overlay">
      <div class="spin"></div>
      <p id="loading-status">PREPARANDO METAL SLUG...</p>
    </div>
    <div id="error-panel" class="panel hidden">
      <div class="card">
        <h2>NO SE PUDO INICIAR</h2>
        <p id="error-text">
          El emulador no pudo arrancar este juego con la configuración actual.
        </p>
        <div class="actions">
          <button id="retry-button" class="primary-btn">REINTENTAR</button>
          <button class="secondary-btn" onclick="history.back()">VOLVER</button>
        </div>
      </div>
    </div>
    <script src="/games/neogeo-launcher.js?v=4"></script>
    <script>
      window.NEOARCADE_NEO_GEO.bootstrap({
        gameTitle: "Metal Slug",
        romUrl: "mslug.zip",
        playerSelector: "#game-container",
        loadingOverlayId: "loading-overlay",
        loadingStatusId: "loading-status",
      });
    </script>
  </body>
</html>
