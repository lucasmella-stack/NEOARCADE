<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NEOARCADE — METAL SLUG</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0a0a0f;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <script src="lib/phaser.js"></script>
    <script src="init_app.js"></script>
    <script src="ledges.js"></script>
    <script src="models/background_model.js"></script>
    <script>
      // ── NEOARCADE Joystick Bridge ─────────────────────────────────────────
      // Arrow keys: left=37 right=39 up=38 down=40
      // A button → D key (68) = saltar
      // B button → A key (65) = disparar
      (function () {
        var activeKeys = {};

        function dispatchKey(type, keyCode) {
          var event = document.createEvent("KeyboardEvent");
          Object.defineProperty(event, "keyCode", {
            get: function () {
              return keyCode;
            },
          });
          Object.defineProperty(event, "which", {
            get: function () {
              return keyCode;
            },
          });
          event.initEvent(type, true, true);
          document.dispatchEvent(event);
        }

        function press(keyCode) {
          if (activeKeys[keyCode]) return;
          activeKeys[keyCode] = true;
          dispatchKey("keydown", keyCode);
        }

        function release(keyCode) {
          if (!activeKeys[keyCode]) return;
          activeKeys[keyCode] = false;
          dispatchKey("keyup", keyCode);
        }

        window.addEventListener("message", function (event) {
          var data = event.data;
          if (!data || data.type !== "neoarcade-input") return;
          var pressed = data.state === "pressed";

          var MAP = {
            left: 37,
            right: 39,
            up: 38,
            down: 40,
            a: 68, // D = jump
            b: 65, // A = fire
            x: 68, // D = jump (alt)
            y: 65, // A = fire (alt)
          };

          var code = MAP[data.button];
          if (!code) return;
          pressed ? press(code) : release(code);
        });
      })();
    </script>
    <script src="init_game.js"></script>
  </body>
</html>
