<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>METAL SLUG — NEOARCADE</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        background: #0a0a0f;
        color: #e0e0e0;
        font-family: "Courier New", Courier, monospace;
        overflow: hidden;
      }
      #emulator-wrap {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #back-btn {
        position: fixed;
        top: 10px;
        left: 12px;
        z-index: 100;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid #00d4ff44;
        color: #00d4ff;
        font-family: inherit;
        font-size: 0.75rem;
        padding: 4px 10px;
        cursor: pointer;
        border-radius: 4px;
        letter-spacing: 1px;
      }
      #back-btn:hover {
        background: #00d4ff22;
      }
      #game-container {
        flex: 1;
        width: 100%;
        height: 100%;
      }
      #loading-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        background: #0a0a0f;
        z-index: 50;
        transition: opacity 0.4s;
      }
      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .spin {
        width: 44px;
        height: 44px;
        border: 3px solid #00d4ff33;
        border-top-color: #00d4ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #loading-overlay p {
        color: #00d4ff;
        font-size: 0.85rem;
        letter-spacing: 3px;
        text-shadow: 0 0 10px #00d4ff;
      }
    </style>
  </head>
  <body>
    <button id="back-btn" onclick="history.back()">&#8592; VOLVER</button>
    <div id="emulator-wrap">
      <div id="game-container"></div>
    </div>
    <div id="loading-overlay">
      <div class="spin"></div>
      <p>CARGANDO METAL SLUG...</p>
    </div>
    <script>
      /* NEOARCADE gamepad bridge */
      (function () {
        var BTN = { a: 0, b: 1, y: 3, start: 9 };
        var AXIS = { left: [0, -1], right: [0, 1], up: [1, -1], down: [1, 1] };
        function mkBtn(p) {
          return { pressed: !!p, touched: !!p, value: p ? 1 : 0 };
        }
        function mkPad(i) {
          return {
            id: "NEOARCADE-P" + (i + 1),
            index: i,
            connected: false,
            timestamp: 0,
            mapping: "standard",
            axes: new Float64Array(4),
            buttons: Array.from({ length: 17 }, function () {
              return mkBtn(false);
            }),
          };
        }
        var pads = [mkPad(0), mkPad(1)];
        var announced = [false, false];
        window.addEventListener("message", function (e) {
          var d = e.data;
          if (!d || d.type !== "input") return;
          var i = (d.player || 1) - 1;
          if (i < 0 || i > 1) return;
          var pad = pads[i];
          pad.timestamp = performance.now();
          var p = d.state === "pressed";
          if (BTN[d.button] !== undefined)
            pad.buttons[BTN[d.button]] = mkBtn(p);
          else if (AXIS[d.button])
            pad.axes[AXIS[d.button][0]] = p ? AXIS[d.button][1] : 0;
          if (!pad.connected) {
            pad.connected = true;
            if (!announced[i]) {
              announced[i] = true;
              window.dispatchEvent(
                new GamepadEvent("gamepadconnected", { gamepad: pad }),
              );
            }
          }
        });
        navigator.getGamepads = function () {
          return pads;
        };
        console.log("[NEOARCADE] Gamepad bridge ready");
      })();

      /* Auto-launch */
      window.EJS_player = "#game-container";
      window.EJS_core = "fbneo";
      window.EJS_gameUrl = "mslug.zip";
      window.EJS_pathtodata = "https://cdn.emulatorjs.org/latest/data/";
      window.EJS_startOnLoaded = true;
      window.EJS_language = "en";
      window.EJS_onGameStart = function () {
        document.getElementById("loading-overlay").classList.add("hidden");
      };
      var s = document.createElement("script");
      s.src = "https://cdn.emulatorjs.org/latest/data/loader.js";
      document.body.appendChild(s);
    </script>
  </body>
</html>
