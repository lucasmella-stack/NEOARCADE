<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NEOARCADE — SNAKE</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0f;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <canvas id="g"></canvas>
    <script>
      (function () {
        const C = document.getElementById("g");
        const X = C.getContext("2d");

        function resize() {
          const w = window.innerWidth,
            h = window.innerHeight;
          const s = Math.min(w / 800, h / 600);
          C.width = 800;
          C.height = 600;
          C.style.width = Math.floor(800 * s) + "px";
          C.style.height = Math.floor(600 * s) + "px";
        }
        resize();
        window.addEventListener("resize", resize);

        const CYAN = "#58FAFD",
          BLUE = "#024DD6",
          BG = "#0a0a0f",
          WHITE = "#fff",
          RED = "#ff4466",
          GREEN = "#44ff88";
        const CELL = 20,
          COLS = 40,
          ROWS = 30;

        function emitSfx(sound) {
          window.parent.postMessage({ type: "neoarcade-sfx", sound }, "*");
        }

        let state = "menu"; // menu | playing | gameover
        let snake,
          dir,
          nextDir,
          food,
          score,
          highScore = 0,
          speed,
          tickTimer;

        function init() {
          const cx = Math.floor(COLS / 2),
            cy = Math.floor(ROWS / 2);
          snake = [
            { x: cx, y: cy },
            { x: cx - 1, y: cy },
            { x: cx - 2, y: cy },
          ];
          dir = { x: 1, y: 0 };
          nextDir = { x: 1, y: 0 };
          score = 0;
          speed = 120;
          tickTimer = 0;
          placeFood();
        }
        init();

        function placeFood() {
          let fx, fy;
          do {
            fx = Math.floor(Math.random() * COLS);
            fy = Math.floor(Math.random() * ROWS);
          } while (snake.some((s) => s.x === fx && s.y === fy));
          food = { x: fx, y: fy };
        }

        // Input
        const padInput = { up: false, down: false, left: false, right: false };
        let lastPadDir = null;

        document.addEventListener("keydown", (e) => {
          if (state === "menu") {
            state = "playing";
            init();
            emitSfx("ui-start");
          }
          if (
            state === "gameover" &&
            (e.code === "Space" || e.code === "Enter")
          ) {
            state = "playing";
            init();
            emitSfx("ui-start");
            return;
          }
          const d = nextDir;
          if ((e.code === "ArrowUp" || e.code === "KeyW") && d.y === 0)
            nextDir = { x: 0, y: -1 };
          if ((e.code === "ArrowDown" || e.code === "KeyS") && d.y === 0)
            nextDir = { x: 0, y: 1 };
          if ((e.code === "ArrowLeft" || e.code === "KeyA") && d.x === 0)
            nextDir = { x: -1, y: 0 };
          if ((e.code === "ArrowRight" || e.code === "KeyD") && d.x === 0)
            nextDir = { x: 1, y: 0 };
        });

        window.addEventListener("message", (e) => {
          const d = e.data;
          if (d && d.type === "neoarcade-input") {
            const pressed = d.state === "pressed";
            if (d.button === "up") padInput.up = pressed;
            if (d.button === "down") padInput.down = pressed;
            if (d.button === "left") padInput.left = pressed;
            if (d.button === "right") padInput.right = pressed;

            if (pressed) {
              if (state === "menu") {
                state = "playing";
                init();
                emitSfx("ui-start");
              }
              if (state === "gameover" && d.button === "start") {
                state = "playing";
                init();
                emitSfx("ui-start");
                return;
              }
              const nd = nextDir;
              if (d.button === "up" && nd.y === 0) nextDir = { x: 0, y: -1 };
              if (d.button === "down" && nd.y === 0) nextDir = { x: 0, y: 1 };
              if (d.button === "left" && nd.x === 0) nextDir = { x: -1, y: 0 };
              if (d.button === "right" && nd.x === 0) nextDir = { x: 1, y: 0 };
            }
          }
        });

        let lastTime = 0;
        function loop(ts) {
          const dt = ts - lastTime;
          lastTime = ts;

          if (state === "playing") {
            tickTimer += dt;
            if (tickTimer >= speed) {
              tickTimer -= speed;
              tick();
            }
          }
          draw();
          requestAnimationFrame(loop);
        }

        function tick() {
          dir = { ...nextDir };
          const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

          // Wall collision (wrap around)
          if (head.x < 0) head.x = COLS - 1;
          if (head.x >= COLS) head.x = 0;
          if (head.y < 0) head.y = ROWS - 1;
          if (head.y >= ROWS) head.y = 0;

          // Self collision
          if (snake.some((s) => s.x === head.x && s.y === head.y)) {
            state = "gameover";
            if (score > highScore) highScore = score;
            emitSfx("snake-dead");
            return;
          }

          snake.unshift(head);

          // Eat food
          if (head.x === food.x && head.y === food.y) {
            score += 10;
            if (speed > 50) speed -= 2;
            emitSfx("snake-eat");
            placeFood();
          } else {
            snake.pop();
          }
        }

        function draw() {
          X.fillStyle = BG;
          X.fillRect(0, 0, 800, 600);

          // Grid (subtle)
          X.strokeStyle = "#ffffff08";
          X.lineWidth = 0.5;
          for (let i = 0; i <= COLS; i++) {
            X.beginPath();
            X.moveTo(i * CELL, 0);
            X.lineTo(i * CELL, 600);
            X.stroke();
          }
          for (let j = 0; j <= ROWS; j++) {
            X.beginPath();
            X.moveTo(0, j * CELL);
            X.lineTo(800, j * CELL);
            X.stroke();
          }

          if (state === "menu") {
            X.fillStyle = CYAN;
            X.font = "bold 48px monospace";
            X.textAlign = "center";
            X.fillText("SNAKE", 400, 220);
            X.font = "16px monospace";
            X.fillStyle = WHITE;
            X.fillText("↑ ↓ ← →  OR  CONNECT MOBILE", 400, 280);
            X.fillStyle = CYAN + "90";
            X.fillText("PRESS ANY KEY OR BUTTON TO START", 400, 340);
            if (highScore > 0) {
              X.font = "14px monospace";
              X.fillStyle = GREEN;
              X.fillText("HIGH SCORE: " + highScore, 400, 400);
            }
            return;
          }

          // Food (glow)
          X.shadowColor = RED;
          X.shadowBlur = 12;
          X.fillStyle = RED;
          X.beginPath();
          X.arc(
            food.x * CELL + CELL / 2,
            food.y * CELL + CELL / 2,
            CELL / 2 - 2,
            0,
            Math.PI * 2,
          );
          X.fill();
          X.shadowBlur = 0;

          // Snake
          snake.forEach((s, i) => {
            const alpha = 1 - (i / (snake.length + 5)) * 0.6;
            if (i === 0) {
              X.shadowColor = CYAN;
              X.shadowBlur = 14;
              X.fillStyle = CYAN;
            } else {
              X.shadowBlur = 0;
              X.fillStyle = `rgba(88,250,253,${alpha})`;
            }
            X.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
          });
          X.shadowBlur = 0;

          // Score
          X.fillStyle = CYAN;
          X.font = "bold 24px monospace";
          X.textAlign = "left";
          X.fillText("SCORE: " + score, 20, 35);
          if (highScore > 0) {
            X.textAlign = "right";
            X.fillStyle = GREEN;
            X.font = "16px monospace";
            X.fillText("HI: " + highScore, 780, 35);
          }

          if (state === "gameover") {
            X.fillStyle = "#000a";
            X.fillRect(0, 0, 800, 600);
            X.fillStyle = RED;
            X.font = "bold 40px monospace";
            X.textAlign = "center";
            X.fillText("GAME OVER", 400, 260);
            X.fillStyle = CYAN;
            X.font = "bold 28px monospace";
            X.fillText("SCORE: " + score, 400, 310);
            X.font = "16px monospace";
            X.fillStyle = WHITE;
            X.fillText("PRESS ENTER OR START TO PLAY AGAIN", 400, 370);
          }
        }

        requestAnimationFrame(loop);
      })();
    </script>
  </body>
</html>
