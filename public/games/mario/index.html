<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NEOARCADE — MARIO</title>
    <link rel="stylesheet" href="css/game.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        margin: 0;
        background: #0a0a0f;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .info {
        display: none !important;
      }

      canvas {
        max-width: 100vw;
        max-height: 100vh;
        width: min(100vw, 106.25vh);
        height: auto;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #5c94fc;
      }
    </style>
  </head>
  <body>
    <script src="js/util.js"></script>
    <script src="js/input.js"></script>
    <script src="js/resources.js"></script>
    <script src="js/sprite.js"></script>
    <script src="js/entity.js"></script>
    <script src="js/pipe.js"></script>
    <script src="js/mushroom.js"></script>
    <script src="js/fireflower.js"></script>
    <script src="js/star.js"></script>
    <script src="js/fireball.js"></script>
    <script src="js/coin.js"></script>
    <script src="js/bcoin.js"></script>
    <script src="js/goomba.js"></script>
    <script src="js/koopa.js"></script>
    <script src="js/floor.js"></script>
    <script src="js/block.js"></script>
    <script src="js/rubble.js"></script>
    <script src="js/prop.js"></script>
    <script src="js/player.js"></script>
    <script src="js/flag.js"></script>
    <script src="js/levels/level.js"></script>
    <script src="js/levels/11.js"></script>
    <script src="js/levels/11tunnel.js"></script>
    <script>
      (function () {
        const activeKeys = {};

        function dispatchKey(type, keyCode, key) {
          const event = new KeyboardEvent(type, {
            bubbles: true,
            cancelable: true,
            key,
            keyCode,
            which: keyCode,
          });
          Object.defineProperty(event, "keyCode", {
            get() {
              return keyCode;
            },
          });
          Object.defineProperty(event, "which", {
            get() {
              return keyCode;
            },
          });
          document.dispatchEvent(event);
        }

        function press(keyCode, key) {
          if (activeKeys[keyCode]) return;
          activeKeys[keyCode] = true;
          dispatchKey("keydown", keyCode, key);
        }

        function release(keyCode, key) {
          if (!activeKeys[keyCode]) return;
          activeKeys[keyCode] = false;
          dispatchKey("keyup", keyCode, key);
        }

        window.addEventListener("message", (event) => {
          const data = event.data;
          if (!(data && data.type === "neoarcade-input")) return;
          const pressed = data.state === "pressed";

          if (data.button === "left") {
            return pressed ? press(37, "ArrowLeft") : release(37, "ArrowLeft");
          }
          if (data.button === "right") {
            return pressed
              ? press(39, "ArrowRight")
              : release(39, "ArrowRight");
          }
          if (data.button === "up") {
            return pressed ? press(38, "ArrowUp") : release(38, "ArrowUp");
          }
          if (data.button === "down") {
            return pressed ? press(40, "ArrowDown") : release(40, "ArrowDown");
          }
          if (data.button === "a") {
            return pressed ? press(88, "x") : release(88, "x");
          }
          if (data.button === "b") {
            return pressed ? press(90, "z") : release(90, "z");
          }
          if (data.button === "x") {
            return pressed ? press(88, "x") : release(88, "x"); // saltar (alt)
          }
          if (data.button === "y") {
            return pressed ? press(90, "z") : release(90, "z"); // correr (alt)
          }
        });
      })();
    </script>
    <script src="js/game.js"></script>
  </body>
</html>
