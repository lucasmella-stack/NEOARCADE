# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name arcadeneo.com www.arcadeneo.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS + reverse proxy to neoarcade:3000 ───────────────────────────────────
server {
    listen 443 ssl;
    server_name arcadeneo.com www.arcadeneo.com;

    # Cloudflare Origin Certificate
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Only accept traffic from Cloudflare (security: reject direct access)
    # Cloudflare IPv4 ranges — keep in sync with https://www.cloudflare.com/ips-v4
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 108.162.192.0/18;
    allow 131.0.72.0/22;
    allow 141.101.64.0/18;
    allow 162.158.0.0/15;
    allow 172.64.0.0/13;
    allow 173.245.48.0/20;
    allow 188.114.96.0/20;
    allow 190.93.240.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    # Cloudflare IPv6
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    # Allow localhost (healthcheck)
    allow 127.0.0.1;
    deny all;

    # Proxy settings
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $http_cf_connecting_ip;
    proxy_set_header    X-Forwarded-For   $http_cf_connecting_ip;
    proxy_set_header    X-Forwarded-Proto $scheme;

    # WebSocket support (Socket.io)
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        "upgrade";
    proxy_read_timeout  86400;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        proxy_pass http://neoarcade:3000;
    }
}
