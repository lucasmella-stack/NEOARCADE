name: 🔑 Get Unity License (run once)

# Run this ONCE to get your Unity license file.
# Steps:
#   1. Go to Actions → "Get Unity License (run once)" → Run workflow
#   2. Download the artifact "unity-activation-file" (.alf file)
#   3. Go to https://license.unity3d.com/manual  (needs free Unity account)
#   4. Upload the .alf file → download the .ulf file
#   5. In your repo → Settings → Secrets → Actions, add:
#        UNITY_LICENSE  = (full content of the .ulf file)
#        UNITY_EMAIL    = your Unity account email
#        UNITY_PASSWORD = your Unity account password

on:
  workflow_dispatch:

jobs:
  get-license:
    name: Request activation file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 2018.3.8f1

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
