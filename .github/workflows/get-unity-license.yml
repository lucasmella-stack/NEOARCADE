name: 🔑 Get Unity Activation File (run once)

# Runs Unity in Docker to generate the .alf manual activation file.
# Steps after running:
#   1. Actions → this workflow → Run workflow → wait ~5 min
#   2. Download artifact "unity-activation-file" → extract the .alf inside
#   3. Go to https://license.unity3d.com/manual (free Unity account required)
#   4. Upload the .alf → select "Unity Personal" → Next → Download .ulf
#   5. Repo → Settings → Secrets → Actions → New repository secret:
#        UNITY_LICENSE  = full content of the .ulf file (open with Notepad, copy all)
#        UNITY_EMAIL    = your Unity account email
#        UNITY_PASSWORD = your Unity account password
#   6. Then run the "Build Metal Slug" workflow

on:
  workflow_dispatch:

jobs:
  get-activation-file:
    name: Generate .alf activation file
    runs-on: ubuntu-latest
    steps:
      - name: Pull Unity Docker image
        run: |
          UNITY_VERSION="2018.3.8f1"
          UNITY_IMAGE=""
          for ci_ver in 3 2 1 0; do
            IMG="unityci/editor:ubuntu-${UNITY_VERSION}-base-${ci_ver}"
            echo "Trying $IMG ..."
            if docker pull "$IMG"; then
              UNITY_IMAGE="$IMG"
              echo "UNITY_IMAGE=$UNITY_IMAGE" >> "$GITHUB_ENV"
              break
            fi
          done
          if [ -z "$UNITY_IMAGE" ]; then
            echo "ERROR: No Unity image found for $UNITY_VERSION"
            exit 1
          fi
          echo "Using image: $UNITY_IMAGE"

      - name: Create manual activation file
        run: |
          mkdir -p "$HOME/alf"
          docker run --rm \
            -v "$HOME/alf:/alf" \
            "$UNITY_IMAGE" \
            bash -c "
              unity-editor -batchmode -createManualActivationFile \
                -logFile /dev/stdout -quit 2>&1 || true
              find / -name 'Unity*.alf' 2>/dev/null \
                | xargs -I{} cp {} /alf/ 2>/dev/null || true
            "
          echo "=== Generated files ==="
          ls -la "$HOME/alf/"
          cp "$HOME/alf/"*.alf . || { echo "ERROR: no .alf generated"; exit 1; }

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: "*.alf"
          retention-days: 7
