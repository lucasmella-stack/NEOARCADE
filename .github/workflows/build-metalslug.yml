name: 🔫 Build Metal Slug (Unity → WebGL)

# Clones giacoballoccu/MetalSlugClone, builds it to WebGL with Unity 2018.3.8f1,
# patches the output with the NEOARCADE gamepad bridge, and commits the result
# to public/games/slug/ in this repo.
#
# Prerequisites (one-time setup):
#   Add these GitHub Secrets (Settings → Secrets → Actions):
#     UNITY_EMAIL    = your Unity account email (free Unity account)
#     UNITY_PASSWORD = your Unity account password
#   That's it — Personal license is activated automatically, no serial needed.

on:
  workflow_dispatch:
    inputs:
      unity_version:
        description: Unity version (leave blank for auto-detect from ProjectVersion.txt)
        required: false
        default: "2018.3.8f1"

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    # game-ci/unity-builder needs ~8 GB; ubuntu-latest has 14 GB RAM + 30 GB disk
    steps:
      # ── 1. Checkout this repo (NEOARCADE) ────────────────────────────────
      - name: Checkout NEOARCADE
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Clone MetalSlugClone ───────────────────────────────────────────
      - name: Clone MetalSlugClone
        run: |
          git clone --depth 1 https://github.com/giacoballoccu/MetalSlugClone.git MetalSlugClone
          echo "Unity version: $(cat MetalSlugClone/ProjectSettings/ProjectVersion.txt)"

      # ── 3. Inject WebGLBuilder.cs ─────────────────────────────────────────
      - name: Inject WebGL build script
        run: |
          mkdir -p MetalSlugClone/Assets/Editor
          cat > MetalSlugClone/Assets/Editor/WebGLBuilder.cs << 'CSEOF'
          // AUTO-GENERATED by NEOARCADE CI — safe to delete after build
          using System.IO;
          using System.Linq;
          using UnityEditor;
          using UnityEditor.Build.Reporting;
          using UnityEngine;

          public static class WebGLBuilder
          {
              public static void Build()
              {
                  string[] scenes = EditorBuildSettings.scenes
                      .Where(s => s.enabled)
                      .Select(s => s.path)
                      .ToArray();

                  if (scenes.Length == 0)
                  {
                      scenes = Directory
                          .GetFiles("Assets/Scenes", "*.unity", SearchOption.AllDirectories)
                          .Select(p => p.Replace('\\', '/'))
                          .OrderBy(p => p)
                          .ToArray();
                  }

                  Debug.Log($"Building {scenes.Length} scene(s): {string.Join(", ", scenes)}");

                  PlayerSettings.WebGL.compressionFormat = WebGLCompressionFormat.Disabled;

                  var opts = new BuildPlayerOptions
                  {
                      scenes           = scenes,
                      locationPathName = "WebGLBuild",
                      target           = BuildTarget.WebGL,
                      options          = BuildOptions.None,
                  };

                  BuildReport report = BuildPipeline.BuildPlayer(opts);

                  if (report.summary.result == BuildResult.Succeeded)
                  {
                      Debug.Log($"[NEOARCADE] Build succeeded — {report.summary.totalSize} bytes");
                      EditorApplication.Exit(0);
                  }
                  else
                  {
                      Debug.LogError($"[NEOARCADE] Build FAILED: {report.summary.result}");
                      EditorApplication.Exit(1);
                  }
              }
          }
          CSEOF

      # ── 4. Build with Unity (game-ci) ─────────────────────────────────────
      - name: Build Unity project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE_TYPE: Personal
        with:
          unityVersion: ${{ inputs.unity_version || '2018.3.8f1' }}
          projectPath: MetalSlugClone
          targetPlatform: WebGL
          buildMethod: WebGLBuilder.Build
          buildsPath: MetalSlugClone/WebGLBuild

      # ── 5. Copy build → public/games/slug/ ───────────────────────────────
      - name: Copy WebGL output to public/games/slug
        run: |
          echo "Build output:"
          ls -lh MetalSlugClone/WebGLBuild/ || true
          ls -lh MetalSlugClone/WebGLBuild/WebGL/ || true

          # game-ci places output in buildsPath/targetPlatform/
          BUILD_DIR="MetalSlugClone/WebGLBuild/WebGL"
          if [ ! -d "$BUILD_DIR" ]; then
            # fallback: find the index.html
            BUILD_DIR=$(dirname $(find MetalSlugClone/WebGLBuild -name "index.html" | head -1))
          fi

          echo "Using build dir: $BUILD_DIR"
          rm -rf public/games/slug
          cp -r "$BUILD_DIR" public/games/slug

      # ── 6. Inject NEOARCADE gamepad bridge into index.html ───────────────
      - name: Patch index.html with gamepad bridge
        run: python3 scripts/build-slug.py --patch-only public/games/slug/index.html

      # ── 7. Commit & push ──────────────────────────────────────────────────
      - name: Commit WebGL build
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/games/slug/
          git status
          git diff --cached --stat
          git commit -m "feat(slug): add Metal Slug WebGL build [CI]" || echo "Nothing to commit"
          git push

      # ── 8. Upload artifact (backup) ───────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metal-slug-webgl
          path: public/games/slug/
          retention-days: 30
